# ═══════════════════════════════════════════════════════════════════════════════
# Web RTC Client Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# This file configures the client application
# Run on the client machine with: python livekit_client.py --config config-client.yml

# ─────────────────────────────────────────────────────────────────────────────────
# LiveKit Server Connection
# ─────────────────────────────────────────────────────────────────────────────────
livekit:
  # LiveKit server URL
  # For local: ws://localhost:7880
  # For remote: wss://your-server.com:7880 or wss://your-project.livekit.cloud
  url: "ws://192.168.0.125:7880"
  
  api_key: "devkey"
  api_secret: "secret"
  
  # Room name to join
  room: "WebRTC-Room"
  
  identity: "user"

  # Fix ICE/NAT/firewall issues (wait_pc_connection timed out, responsesReceived: 0)
  # Set to true when direct UDP fails - uses TURN relay (requires TURN on server)
  # Or use: python livekit_client.py --force-relay
  # force_relay: true
  # connect_timeout: 30

# ─────────────────────────────────────────────────────────────────────────────────
# Audio Configuration
# ─────────────────────────────────────────────────────────────────────────────────
audio:
  # Sample rate for audio
  sample_rate: 48000
  channels: 1
  
  # Buffer sizes
  buffer_size: 960      # 20ms at 48kHz
  playback_buffer: 4800 # 100ms buffer

# ─────────────────────────────────────────────────────────────────────────────────
# Video Configuration
# ─────────────────────────────────────────────────────────────────────────────────
video:
  # Enable video by default
  enabled: true
  
  # Camera device index (0 = default camera)
  camera_index: 0
  
  # Video resolution
  width: 640
  height: 480
  
  # Frame rate (lower = less bandwidth)
  fps: 15

# ─────────────────────────────────────────────────────────────────────────────────
# Logging Configuration
# ─────────────────────────────────────────────────────────────────────────────────
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(levelname)s - %(message)s"

